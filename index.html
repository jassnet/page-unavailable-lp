<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ページを表示できません</title>
    <meta name="robots" content="noindex">
    <style>
      :root {
        --bg: #fbfbfa;
        --ink: #2e2d2b;
        --muted: #68645f;
        --line: #dedbd5;
        --accent: #f27a2d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 50% 14%, rgba(242, 122, 45, 0.08), transparent 28rem),
          var(--bg);
        color: var(--ink);
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "YuGothic", Meiryo, sans-serif;
      }

      main {
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: clamp(36px, 8vw, 88px) 22px;
      }

      .notice {
        width: min(100%, 720px);
        display: grid;
        justify-items: center;
        gap: clamp(18px, 3vw, 26px);
        text-align: center;
      }

      .mark {
        width: clamp(86px, 18vw, 124px);
        aspect-ratio: 1;
        position: relative;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 50%;
        background: #fff;
      }

      .mark::before,
      .mark::after {
        content: "";
        position: absolute;
        border-radius: 999px;
      }

      .mark::before {
        width: 42%;
        height: 42%;
        border: 2px solid var(--ink);
        transform: rotate(-18deg);
      }

      .mark::after {
        width: 58%;
        height: 2px;
        background: var(--accent);
        transform: rotate(-34deg);
      }

      .label {
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
      }

      h1 {
        margin: 0;
        font-size: clamp(26px, 5.4vw, 42px);
        font-weight: 600;
        line-height: 1.5;
        letter-spacing: 0;
        text-wrap: balance;
      }

      p {
        max-width: 34rem;
        margin: 0;
        color: var(--muted);
        font-size: clamp(15px, 2.5vw, 17px);
        line-height: 1.9;
        text-wrap: pretty;
      }

      @media (max-width: 520px) {
        main {
          align-items: start;
          padding-top: 72px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="notice" aria-labelledby="page-title">
        <div class="mark" aria-hidden="true"></div>
        <div class="label">PAGE UNAVAILABLE</div>
        <h1 id="page-title">申し訳ございません。<br>指定のページは現在表示できません。</h1>
        <p>時間をおいて再度アクセスしていただくか、別のページからお試しください。</p>
      </section>
    </main>
  </body>
</html>
